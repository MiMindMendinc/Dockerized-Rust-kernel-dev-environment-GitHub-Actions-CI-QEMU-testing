# Build the kernel for the bare-metal x86_64 target.
[build]
target = "x86_64-unknown-none"

# Compile core and compiler_builtins from source because there is no
# pre-compiled standard library for x86_64-unknown-none.
[unstable]
build-std = ["core", "compiler_builtins"]
build-std-features = ["compiler-builtins-mem"]
